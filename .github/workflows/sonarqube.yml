name: SonarQube Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if configured)
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "jest.config.js" ]; then
            npm run test:coverage
          else
            echo "No test configuration found, skipping tests"
          fi

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .

      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Add comment to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: analysis } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              per_page: 1
            });

            const comment = `
            ## 🔍 SonarQube Analysis Results

            Quality analysis has been completed for this pull request.

            ### 📊 Analysis Details
            - **Branch**: \`${context.payload.pull_request.head.ref}\`
            - **Commit**: \`${context.sha.substring(0, 7)}\`
            - **Analysis URL**: ${{ secrets.SONAR_HOST_URL }}/dashboard?id=nuxtjs-chronicles-part-1

            ### 🎯 Next Steps
            1. Check the analysis results on SonarQube dashboard
            2. Review and fix any issues flagged
            3. Ensure Quality Gate passes

            ---
            *This comment is automatically generated by SonarQube analysis*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });