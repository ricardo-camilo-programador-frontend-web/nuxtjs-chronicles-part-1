# Required metadata
sonar.projectKey=nuxtjs-chronicles-part-1
sonar.projectName=NuxtJS Chronicles Part 1
sonar.projectVersion=1.0.0

# Source and test paths for Nuxt 3
sonar.sources=.
sonar.tests=tests

# Inclusions - focusing on source code files
sonar.inclusions=components/**/*,composables/**/*,layouts/**/*,middleware/**/*,pages/**/*,plugins/**/*,utils/**/*,app.vue,error.vue

# Exclusions - excluding generated files, dependencies, and test files
sonar.exclusions=**/node_modules/**,**/.nuxt/**,**/.output/**,**/dist/**,**/coverage/**,**/.vscode/**,**/.idea/**,*.log,*.lock,**/*.d.ts,**/*.spec.ts,**/*.test.ts,**/tests/**

# Language settings
sonar.javascript.file.suffixes=.js,.mjs,.cjs,.vue
sonar.typescript.file.suffixes=.ts,.vue
sonar.vue.file.suffixes=.vue

# Analysis settings
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
sonar.pullrequest.github.repository=ricardo-camilo-programador-frontend-web/nuxtjs-chronicles-part-1

# Coverage report paths (will be configured when tests are added)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.typescript.lcov.reportPaths=coverage/lcov.info
# sonar.testExecutionReportPaths=test-report.xml

# Quality gate
sonar.qualitygate.wait=true

# Nuxt specific settings
sonar.analysis.mode=publish
sonar.verbose=true

# SonarQube server configuration
sonar.host.url=http://localhost:9000
# sonar.token=SEU_TOKEN_AQUI # This should be set in CI/CD secrets or environment variables

# Branch configuration (requires Developer Edition or higher)
# sonar.branch.name=${BRANCH_NAME}
# sonar.pullrequest.key=${PULL_REQUEST_ID}
# sonar.pullrequest.branch=${PULL_REQUEST_BRANCH}
# sonar.pullrequest.base=${PULL_REQUEST_BASE}

# Command to run sonar from console
# sonar \
#   -Dsonar.host.url=http://localhost:9000 \
#   -Dsonar.token=SEU_TOKEN_AQUI \
#   -Dsonar.projectKey=nuxtjs-chronicles-part-1